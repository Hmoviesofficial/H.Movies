<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Poster Gallery</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#000; color:white; text-align:center; }
        .nav { padding:15px; background:#111; border-bottom:2px solid red; position:sticky; top:0; z-index:100; }
        .logo { color:red; font-size:24px; font-weight:bold; }
        .search { width:80%; padding:12px; margin-top:10px; border-radius:20px; border:none; background:#222; color:white; outline:none; }
        .row { display:flex; flex-wrap:wrap; padding:15px; justify-content:center; gap:10px; }
        .card { width:140px; background:#111; border-radius:8px; overflow:hidden; border:1px solid #333; cursor:pointer; }
        .card img { width:100%; height:200px; object-fit:cover; display:block; }
        .title { font-size:11px; padding:5px; height:30px; overflow:hidden; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.MOVIES GALLERY</div>
        <input type="text" id="s" class="search" placeholder="Search Movie Name...">
    </div>
    <div id="out" class="row">Loading Gallery...</div>

    <script>
        // Poster Database (OMDb)
        function load(q) {
            var box = document.getElementById('out');
            var query = q ? q : "2025";
            
            fetch("https://www.omdbapi.com/?s=" + encodeURIComponent(query) + "&apikey=61f2249e")
            .then(res => res.json())
            .then(data => {
                box.innerHTML = '';
                if(data.Search) {
                    data.Search.forEach(m => {
                        if(m.Poster !== 'N/A') {
                            // Proxying image to bypass blocks
                            var imgProxy = "https://images.weserv.nl/?url=" + encodeURIComponent(m.Poster);
                            
                            var item = document.createElement('div');
                            item.className = 'card';
                            item.innerHTML = `<img src="${imgProxy}"><div class="title">${m.Title}</div>`;
                            
                            // Jab poster pe click ho toh watch page pe jaye (Next Step)
                            item.onclick = function() {
                                window.location.href = "watch.html?id=" + m.imdbID;
                            };
                            
                            box.appendChild(item);
                        }
                    });
                } else { box.innerHTML = "No Posters Found."; }
            }).catch(e => { box.innerHTML = "Internet Error. Try VPN."; });
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') load(this.value.trim());
        };
        window.onload = function() { load('Action'); };
    </script>
</body>
</html>
