<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies Pro - Global</title>
    <style>
        body { margin:0; font-family: sans-serif; background:#000; color:#fff; text-align:center; }
        .nav { padding:15px; background:#111; border-bottom:3px solid #2ecc71; }
        .logo { color:#2ecc71; font-size:24px; font-weight:bold; margin-bottom:10px; }
        .search { width:85%; padding:12px; border-radius:5px; border:none; background:#222; color:#fff; outline:none; }
        .grid { display:flex; flex-wrap:wrap; padding:15px; gap:10px; justify-content:center; }
        .card { width:140px; background:#111; border-radius:8px; border:1px solid #333; overflow:hidden; }
        .card img { width:100%; height:200px; object-fit:cover; display:block; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.MOVIES PRO</div>
        <input type="text" id="s" class="search" placeholder="Search Movie (e.g. Avatar)...">
    </div>
    <div id="out" class="grid">Type movie name and press Enter...</div>

    <script>
        function load(q) {
            const box = document.getElementById('out');
            box.innerHTML = 'Connecting to Global Servers...';
            
            // Sabse stable API key use kar raha hoon
            fetch("https://www.omdbapi.com/?s=" + encodeURIComponent(q) + "&apikey=61f2249e")
            .then(res => res.json())
            .then(data => {
                box.innerHTML = '';
                if(data.Search) {
                    data.Search.forEach(m => {
                        if(m.Poster !== 'N/A') {
                            // Image Proxy bypass
                            const proxyImg = "https://images.weserv.nl/?url=" + encodeURIComponent(m.Poster);
                            const item = document.createElement('div');
                            item.className = 'card';
                            item.innerHTML = `<img src="${proxyImg}"><div style="font-size:11px;padding:5px;">${m.Title}</div>`;
                            box.appendChild(item);
                        }
                    });
                } else { box.innerHTML = "No Results. Check spelling or use VPN."; }
            }).catch(e => { box.innerHTML = "Internet Error. Try VPN."; });
        }
        document.getElementById('s').onkeypress = (e) => { if(e.key==='Enter') load(e.target.value); };
        // Page khulte hi automatic movie load ho
        window.onload = () => load('2025');
    </script>
</body>
</html>
