<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}

.nav{padding:15px;background:#111;position:sticky;top:0;}
.logo{color:#2ecc71;font-size:24px;font-weight:bold;}

.search{
width:100%;padding:10px;margin-top:10px;
background:#222;border:none;border-radius:8px;color:#fff;
}

.cats{
display:flex;gap:10px;margin-top:10px;overflow-x:auto;
}
.c-btn{
padding:8px 15px;background:#222;border-radius:20px;cursor:pointer;
}
.c-btn.active{background:#2ecc71;color:#000;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;padding:15px;
}

.card{
background:#111;border-radius:10px;overflow:hidden;
}
.card img{
width:100%;height:220px;object-fit:cover;
}

.overlay{padding:10px;}

.btn{
background:#2ecc71;color:#000;
padding:5px 8px;border-radius:5px;
font-size:12px;text-decoration:none;
margin-top:5px;display:inline-block;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">H.MOVIES PRO</div>

<input id="search" class="search" placeholder="Search movies...">

<div class="cats">
<div class="c-btn active" onclick="filterCat('all',this)">All</div>
<div class="c-btn" onclick="filterCat('movie',this)">Movies</div>
<div class="c-btn" onclick="filterCat('series',this)">Series</div>
<div class="c-btn" onclick="filterCat('anime',this)">Anime</div>
</div>
</div>

<div id="grid" class="grid"></div>

<script>

const movies = [
{title:"Avengers Endgame",cat:"movie",img:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",id:"tt4154796"},
{title:"Joker",cat:"movie",img:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",id:"tt7286456"},
{title:"Spider Man No Way Home",cat:"movie",img:"https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg",id:"tt10872600"},

// ✅ FIXED DEMON SLAYER POSTER
{title:"Demon Slayer",cat:"anime",img:"https://image.tmdb.org/t/p/w500/xUfRZu2mi8jH6SzQEJGP6tjBuYj.jpg",id:"tt9335498"},

{title:"Attack on Titan",cat:"anime",img:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg",id:"tt2560140"},
{title:"Money Heist",cat:"series",img:"https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg",id:"tt6468322"},
{title:"Breaking Bad",cat:"series",img:"https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg",id:"tt0903747"},
{title:"Interstellar",cat:"movie",img:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",id:"tt0816692"},
{title:"John Wick",cat:"movie",img:"https://image.tmdb.org/t/p/w500/r2bmN9qaW7hYq6R9mS8H3wW9z3M.jpg",id:"tt2911666"}
];

let currentCat = "all";

function render(){
 const grid = document.getElementById("grid");
 const search = document.getElementById("search").value.toLowerCase();

 grid.innerHTML="";

 movies.forEach(m=>{
  if(currentCat !== "all" && m.cat !== currentCat) return;
  if(!m.title.toLowerCase().includes(search)) return;

  const watch = `https://vidsrc.me/embed/movie?imdb=${m.id}`;

  const card = document.createElement("div");
  card.className="card";

  card.innerHTML=`
  <img src="${m.img}">
  <div class="overlay">
    <div>${m.title}</div>
    <a href="${watch}" target="_blank" class="btn">Watch</a>
    <a href="${watch}" target="_blank" class="btn">Download</a>
  </div>
  `;

  grid.appendChild(card);
 });
}

function
