<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H.Movies Pro - Watch Trailers & Discover Movies</title>

<meta name="description" content="Discover latest movies, trailers, ratings and more. Fast and clean movie browsing website.">

<!-- Adsense (baad me apni ID lagana) -->

crossorigin="anonymous"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#000;
    color:#fff;
}
.header{
    padding:15px;
    text-align:center;
    font-size:22px;
    color:#00ff88;
}
.search{
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:#fff;
}
.filters{
    text-align:center;
}
.filters button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#222;
    color:#fff;
}
.active{
    background:#00ff88;
    color:#000;
}
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}
.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
}
.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}
.title{
    padding:8px;
    font-size:14px;
}
.btn{
    display:block;
    background:#00ff88;
    color:#000;
    text-align:center;
    padding:8px;
    margin:5px;
    border-radius:8px;
    text-decoration:none;
}
.load{
    width:90%;
    margin:15px auto;
    display:block;
    padding:12px;
    background:#00ff88;
    border:none;
    border-radius:10px;
}

/* Footer */
.footer{
    text-align:center;
    padding:20px;
    background:#111;
    font-size:14px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="header">H.MOVIES PRO</div>

<input type="text" id="search" class="search" placeholder="Search movies...">

<div class="filters">
<button class="active" onclick="setFilter('all',event)">All</button>
<button onclick="setFilter('movie',event)">Movies</button>
<button onclick="setFilter('tv',event)">Series</button>
<button onclick="setFilter('anime',event)">Anime</button>
<button onclick="setFilter('hindi',event)">Hindi</button>
</div>

<!-- Ads space -->
<div style="text-align:center;margin:10px;">
<!-- AdSense banner yahan lagega -->
</div>

<div id="movies" class="grid"></div>

<button class="load" onclick="loadMore()">Load More</button>

<div class="footer">
© 2026 H.Movies Pro | Powered by TMDB  
<br>
Disclaimer: This site does not host any files. All content is for informational purposes only.
</div>

<script>

const API_KEY = "f409489a42d61f514484fa959f76fec7";

let page = 1;
let filter = "all";
let query = "";

// FETCH
function loadMovies(reset=false){
    if(reset){
        page = 1;
        document.getElementById("movies").innerHTML="";
    }

    let url = query 
    ? `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}&page=${page}`
    : `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&page=${page}`;

    fetch(url)
    .then(r=>r.json())
    .then(data=>{
        show(data.results);
    });
}

// SHOW
function show(data){
    const box = document.getElementById("movies");

    data.forEach(m=>{
        if(!m.poster_path) return;

        if(filter==="movie" && m.media_type!=="movie") return;
        if(filter==="tv" && m.media_type!=="tv") return;
        if(filter==="anime" && m.original_language!=="ja") return;
        if(filter==="hindi" && m.original_language!=="hi") return;

        let title = m.title || m.name;

        box.innerHTML += `
        <div class="card">
            <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
            <div class="title">${title}</div>

            <a class="btn" target="_blank"
            href="https://www.youtube.com/results?search_query=${title} trailer">
            ▶ Watch Trailer
            </a>

            <a class="btn" target="_blank"
            href="https://www.google.com/search?q=${title} full movie">
            🔍 Find Movie
            </a>
        </div>
        `;
    });
}

// LOAD MORE
function loadMore(){
    page++;
    loadMovies();
}

// FILTER
function setFilter(f,e){
    filter = f;
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    loadMovies(true);
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
    query = e.target.value;
    loadMovies(true);
});

// INIT
loadMovies();

</script>

</body>
</html>
