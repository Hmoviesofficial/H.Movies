<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.nav{padding:15px;background:#111;}
.logo{color:#2ecc71;font-size:24px;font-weight:bold;}

.search{
width:100%;padding:10px;margin-top:10px;
background:#222;border:none;border-radius:8px;color:#fff;
}

.cats{display:flex;gap:10px;margin-top:10px;}
.c-btn{padding:8px 15px;background:#222;border-radius:20px;cursor:pointer;}
.c-btn.active{background:#2ecc71;color:#000;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;
}

.card{background:#111;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:200px;object-fit:cover;}

.overlay{padding:8px;}

.btn{
background:#2ecc71;color:#000;
padding:5px;border-radius:5px;
text-decoration:none;font-size:12px;
margin-right:5px;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">H.MOVIES PRO</div>

<input id="search" class="search" placeholder="Search movies...">

<div class="cats">
<div class="c-btn active" onclick="setCat('all',this)">All</div>
<div class="c-btn" onclick="setCat('movie',this)">Movies</div>
<div class="c-btn" onclick="setCat('series',this)">Series</div>
<div class="c-btn" onclick="setCat('anime',this)">Anime</div>
</div>
</div>

<div id="grid" class="grid"></div>

<script>

const data = [
{title:"Avengers Endgame",cat:"movie",img:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",id:"tt4154796"},
{title:"Joker",cat:"movie",img:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",id:"tt7286456"},
{title:"Spider Man No Way Home",cat:"movie",img:"https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg",id:"tt10872600"},
{title:"Demon Slayer",cat:"anime",img:"https://image.tmdb.org/t/p/w500/xUfRZu2mi8jH6SzQEJGP6tjBuYj.jpg",id:"tt9335498"},
{title:"Attack on Titan",cat:"anime",img:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg",id:"tt2560140"},
{title:"Money Heist",cat:"series",img:"https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg",id:"tt6468322"},
{title:"Breaking Bad",cat:"series",img:"https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg",id:"tt0903747"}
];

let current = "all";

function render(){
 const grid = document.getElementById("grid");
 const search = document.getElementById("search").value.toLowerCase();

 grid.innerHTML = "";

 data.forEach(m=>{
  if(current !== "all" && m.cat !== current) return;
  if(!m.title.toLowerCase().includes(search)) return;

  const link = `https://vidsrc.me/embed/movie?imdb=${m.id}`;

  const card = document.createElement("div");
  card.className="card";

  card.innerHTML = `
  <img src="${m.img}">
  <div class="overlay">
    <div>${m.title}</div>
    <a href="${link}" target="_blank" class="btn">Watch</a>
    <a href="${link}" target="_blank" class="btn">Download</a>
  </div>
  `;

  grid.appendChild(card);
 });
}

function setCat(cat,btn){
 current = cat;
 document.querySelectorAll(".c-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
 render();
}

document.getElementById("search").addEventListener("input",render);

// 🔥 IMPORTANT
window.onload = render;

</script>

</body>
</html>
