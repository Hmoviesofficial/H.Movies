<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff}
.header{padding:15px;font-size:22px;color:#00ff88;font-weight:bold}

.search{width:90%;margin:10px auto;display:block;padding:10px;background:#111;border:none;color:#fff}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.title{padding:5px}

.btn{background:#00ff88;color:#000;padding:6px;margin:5px;border:none;border-radius:5px;cursor:pointer}

/* ADMIN */
.admin{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
flex-direction:column;
gap:5px;
}

.admin input{
padding:8px;
background:#222;
border:none;
color:#fff;
}
</style>
</head>

<body>

<div class="header">H.MOVIES PRO</div>

<input id="search" class="search" placeholder="Search...">

<div id="grid" class="grid"></div>

<!-- ADMIN PANEL -->
<div class="admin">
<input id="title" placeholder="Movie Title">
<input id="poster" placeholder="Poster URL">
<input id="link1" placeholder="Server 1 Link">
<input id="link2" placeholder="Server 2 Link">
<button class="btn" onclick="addMovie()">➕ Add Movie</button>
</div>

<script>

// 🎬 DATABASE (localStorage)
let data = JSON.parse(localStorage.getItem("movies")) || [];

// SHOW
function show(){
 const grid=document.getElementById("grid");
 const s=document.getElementById("search").value.toLowerCase();

 let filtered=data.filter(m=>m.t.toLowerCase().includes(s));

 grid.innerHTML=filtered.map(m=>`
 <div class="card">
   <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x400'">
   <div class="title">${m.t}</div>

   <button class="btn" onclick='openServers(${JSON.stringify(m)})'>
   ▶ Watch
   </button>
 </div>
 `).join("");
}

// ➕ ADD MOVIE
function addMovie(){
 const t=document.getElementById("title").value;
 const img=document.getElementById("poster").value;
 const l1=document.getElementById("link1").value;
 const l2=document.getElementById("link2").value;

 if(!t || !img) return alert("Fill all");

 data.push({t,img,l1,l2});

 localStorage.setItem("movies",JSON.stringify(data));

 show();
}

// 🎬 OPEN SERVER SELECT
function openServers(m){

 const box=document.createElement("div");

 box.innerHTML=`
 <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;text-align:center;padding-top:50px;">

 <h2>${m.t}</h2>

 <button class="btn" onclick="play('${m.l1}')">Server 1</button>
 <button class="btn" onclick="play('${m.l2}')">Server 2</button>

 <br><br>
 <button class="btn" onclick="this.parentElement.remove()">Close</button>

 </div>
 `;

 document.body.appendChild(box);
}

// ▶ PLAY
function play(link){
 const player=document.createElement("div");

 player.innerHTML=`
 <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:10000;">
 
 <button onclick="this.parentElement.remove()" 
 style="position:absolute;top:10px;right:10px;background:red;color:#fff;border:none;padding:10px;">
 X
 </button>

 <iframe src="${link}" width="100%" height="100%" allowfullscreen></iframe>

 </div>
 `;

 document.body.appendChild(player);
}

// SEARCH
document.getElementById("search").addEventListener("input",show);

// FIRST LOAD
show();

</script>

</body>
</html>
