<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Global Fix</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#080808; color:white; }
        .nav { padding:15px; background:#141414; text-align:center; border-bottom:2px solid #e50914; }
        .logo { color:#e50914; font-weight:bold; font-size:26px; }
        .search { background:#2a2d36; border:none; padding:12px; border-radius:20px; color:white; width:80%; margin-top:10px; outline:none; }
        .row { display:flex; flex-wrap:wrap; padding:10px; gap:10px; justify-content:center; }
        .card { width:45%; background:#141414; border-radius:10px; margin-bottom:15px; overflow:hidden; border:1px solid #333; text-align:center; }
        .card img { width:100%; height:230px; object-fit:cover; display:block; background:#222; }
        .title { font-size:12px; padding:8px 5px; height:35px; overflow:hidden; font-weight:bold; }
        .btn { display:block; padding:10px; text-decoration:none; font-weight:bold; color:white; margin:5px; font-size:11px; background:#e50914; border-radius:5px; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.Movies</div>
        <input type="text" id="s" class="search" placeholder="Search Movie (e.g. Batman, Jawan)...">
    </div>
    <div id="out" class="row"></div>

    <script>
        function load(q) {
            var box = document.getElementById('out');
            box.innerHTML = 'Connecting...';
            
            // TMDB + OMDb Search Logic
            var tmdbKey = '86202476b76a0841f22e848981329124';
            var query = q || 'trending';
            var url = "https://api.themoviedb.org/3/search/movie?api_key=" + tmdbKey + "&query=" + encodeURIComponent(query);

            if(!q) url = "https://api.themoviedb.org/3/movie/popular?api_key=" + tmdbKey;

            fetch(url).then(res => res.json()).then(data => {
                box.innerHTML = '';
                if(!data.results || data.results.length === 0) {
                    box.innerHTML = 'Still searching... Try refreshing the page.';
                    return;
                }
                data.results.forEach(m => {
                    if(m.poster_path) {
                        // Using a different proxy for images
                        var img = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500" + m.poster_path;
                        var watch = "https://vidsrc.me/embed/movie?tmdb=" + m.id;
                        var item = document.createElement('div');
                        item.className = 'card';
                        item.innerHTML = `<img src="${img}" onerror="this.src='https://via.placeholder.com/300x450?text=Poster'"><div class="title">${m.title}</div><a href="${watch}" target="_blank" class="btn">WATCH & DOWNLOAD</a>`;
                        box.appendChild(item);
                    }
                });
            }).catch(e => {
                box.innerHTML = 'Connection Error. Please check Internet or VPN.';
            });
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') load(e.target.value.trim());
        };
        
        window.onload = function() { load(''); };
    </script>
</body>
</html>
