<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Global Watch & Download</title>
    <style>
        body { margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0a0a0a; color:white; }
        .nav { padding:20px; background:#111; text-align:center; border-bottom:2px solid #e50914; position:sticky; top:0; z-index:100; }
        .logo { color:#e50914; font-weight:bold; font-size:28px; text-transform:uppercase; letter-spacing:2px; }
        .search { background:#222; border:1px solid #444; padding:12px; border-radius:25px; color:white; width:85%; max-width:600px; margin-top:15px; outline:none; transition:0.3s; }
        .search:focus { border-color:#e50914; box-shadow: 0 0 10px #e50914; }
        .row { display:flex; flex-wrap:wrap; padding:20px; gap:15px; justify-content:center; }
        .card { width:160px; background:#181818; border-radius:12px; overflow:hidden; border:1px solid #333; transition:0.3s; cursor:pointer; }
        .card:hover { transform:translateY(-5px); border-color:#e50914; }
        .card img { width:100%; height:240px; object-fit:cover; background:#222; }
        .title { font-size:13px; padding:10px; height:35px; overflow:hidden; text-align:center; font-weight:600; line-height:1.2; }
        .btn-box { display:flex; flex-direction:column; padding:5px; }
        .btn { padding:8px; text-decoration:none; font-weight:bold; color:white; text-align:center; background:#e50914; margin:3px; border-radius:5px; font-size:11px; }
        .btn-dl { background:#222; border:1px solid #e50914; }
        #status { text-align:center; padding:20px; color:#efefef; font-size:14px; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.Movies</div>
        <input type="text" id="s" class="search" placeholder="Search Movie (e.g. Iron Man, Pushpa, Joker)...">
    </div>
    <div id="status">Type a movie name and press Enter</div>
    <div id="out" class="row"></div>

    <script>
        var k = '86202476b76a0841f22e848981329124';

        function load(q) {
            var box = document.getElementById('out');
            var status = document.getElementById('status');
            status.innerHTML = 'Connecting to Global Servers...';
            
            // TMDB Search with trending fallback
            var url = q 
                ? "https://api.themoviedb.org/3/search/movie?api_key=" + k + "&query=" + encodeURIComponent(q)
                : "https://api.themoviedb.org/3/movie/popular?api_key=" + k;

            fetch(url).then(res => res.json()).then(data => {
                status.innerHTML = q ? 'Results for: ' + q : 'Trending Worldwide';
                box.innerHTML = '';
                
                if(!data.results || data.results.length === 0) {
                    status.innerHTML = 'No movies found. Check spelling.';
                    return;
                }

                data.results.forEach(m => {
                    if(m.poster_path) {
                        // Proxy logic to bypass block
                        var img = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500" + m.poster_path;
                        var watchLink = "https://vidsrc.me/embed/movie?tmdb=" + m.id;
                        var downloadLink = "https://www.2embed.cc/embed/" + m.id;

                        var item = document.createElement('div');
                        item.className = 'card';
                        item.innerHTML = `
                            <img src="${img}" onerror="this.src='https://via.placeholder.com/500x750?text=Poster+Blocked'">
                            <div class="title">${m.title}</div>
                            <div class="btn-box">
                                <a href="${watchLink}" target="_blank" class="btn">WATCH NOW</a>
                                <a href="${downloadLink}" target="_blank" class="btn btn-dl">DOWNLOAD</a>
                            </div>
                        `;
                        box.appendChild(item);
                    }
                });
            }).catch(err => {
                status.innerHTML = 'Connection Error. Please check Internet.';
            });
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') {
                load(e.target.value.trim());
            }
        };

        // Initial Load
        window.onload = function() { load(''); };
    </script>
</body>
</html>
