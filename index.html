<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Final Fix</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#000; color:white; text-align:center; }
        .nav { padding:15px; background:#111; border-bottom:2px solid red; position:sticky; top:0; z-index:100; }
        .logo { color:red; font-size:24px; font-weight:bold; text-transform:uppercase; }
        .search { width:80%; padding:12px; margin-top:10px; border-radius:25px; border:1px solid #444; background:#222; color:white; outline:none; }
        .row { display:flex; flex-wrap:wrap; padding:15px; justify-content:center; gap:15px; }
        .card { width:160px; background:#1a1a1a; border-radius:10px; overflow:hidden; border:1px solid #333; transition: 0.3s; }
        .card:hover { border-color:red; transform: scale(1.02); }
        .card img { width:100%; height:240px; object-fit:cover; background:#222; }
        .t { font-size:13px; padding:8px; height:35px; overflow:hidden; font-weight:bold; }
        .btn { display:block; background:red; color:white; text-decoration:none; padding:10px; font-weight:bold; font-size:12px; border-radius:0 0 10px 10px; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.Movies Official</div>
        <input type="text" id="s" class="search" placeholder="Search any movie (e.g. Avatar)...">
    </div>
    <div id="out" class="row">Loading movies... Please wait.</div>

    <script>
        // OMDb API with a fallback for empty search
        var api = "https://www.omdbapi.com/?apikey=61f2249e&s=";

        function load(q) {
            var box = document.getElementById('out');
            var searchItem = q ? q : "2024"; // Default movies for first look
            
            fetch(api + encodeURIComponent(searchItem))
            .then(res => res.json())
            .then(data => {
                box.innerHTML = '';
                if(data.Search) {
                    data.Search.forEach(m => {
                        if(m.Poster !== 'N/A') {
                            var watch = "https://vidsrc.to/embed/movie/" + m.imdbID;
                            box.innerHTML += `
                                <div class="card">
                                    <img src="${m.Poster}">
                                    <div class="t">${m.Title}</div>
                                    <a href="${watch}" target="_blank" class="btn">WATCH NOW</a>
                                </div>`;
                        }
                    });
                } else {
                    box.innerHTML = '<p>No results found. Try searching "Action" or "Horror".</p>';
                }
            })
            .catch(e => { box.innerHTML = '<p>Server busy. Check internet.</p>'; });
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') load(this.value.trim());
        }
        
        window.onload = function() { load(''); };
    </script>
</body>
</html>
