<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff}
.header{padding:15px;font-size:22px;color:#00ff88;font-weight:bold}
.search{width:90%;margin:10px auto;display:block;padding:12px;border:none;border-radius:10px;background:#111;color:#fff}

.tabs{display:flex;gap:10px;padding:10px;overflow:auto}
.tab{padding:8px 15px;background:#111;border-radius:20px;cursor:pointer}
.tab.active{background:#00ff88;color:#000}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:230px;object-fit:cover}
.title{padding:8px;font-size:14px}

.btns{display:flex;flex-direction:column;gap:5px;padding:8px}
.btn{background:#00ff88;color:#000;padding:8px;text-align:center;border-radius:6px;border:none}

.load{margin:20px;padding:12px;background:#00ff88;text-align:center;border-radius:10px;color:#000;cursor:pointer}
</style>
</head>

<body>

<div class="header">H.MOVIES PRO</div>

<input class="search" id="search" placeholder="Search movies...">

<div class="tabs">
  <div class="tab active" onclick="setCat('all',this)">All</div>
  <div class="tab" onclick="setCat('series',this)">Series</div>
</div>

<div class="grid" id="grid"></div>

<div class="load" onclick="loadMore()">Load More</div>

<script>

// 🎬 DATA (your direct link added)
const data = [
{
  t:"The Boys Season 1",
  c:"series",
  img:"https://image.tmdb.org/t/p/w500/stTEycfG9928HYGEISBFaG1ngjM.jpg",
  link:"https://v.inmoviebox.com/O3N6JBYuzD9"
},
{
  t:"Breaking Bad",
  c:"series",
  img:"https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg"
}
];

let shown = 0;
let cat = "all";

// 🎬 SHOW
function show(){
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = data.filter(x =>
    (cat==="all" || x.c===cat) &&
    x.t.toLowerCase().includes(search)
  );

  const slice = filtered.slice(0, shown);

  grid.innerHTML = slice.map(m => `
    <div class="card">

      <img src="${m.img}" 
      onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">

      <div class="title">${m.t}</div>

      <div class="btns">

        <button class="btn" onclick='watchMovie(${JSON.stringify(m)})'>
        ▶ Watch
        </button>

      </div>
    </div>
  `).join("");
}

// 🎬 WATCH FUNCTION (SMART)
function watchMovie(movie){

  if(movie.link){
    // 🔥 direct player
    const player = document.createElement("div");
    player.innerHTML = `
      <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;">
        
        <button onclick="this.parentElement.remove()" 
          style="position:absolute;top:10px;right:10px;padding:10px;background:red;color:white;border:none;">
          ✖ Close
        </button>

        <iframe src="${movie.link}" width="100%" height="100%" allowfullscreen></iframe>

      </div>
    `;
    document.body.appendChild(player);

  } else {
    // fallback (always work)
    window.open(`https://www.google.com/search?q=${movie.t}+watch`, '_blank');
  }

}

// LOAD MORE
function loadMore(){
  shown += 10;
  show();
}

// CATEGORY
function setCat(c,el){
  cat = c;
  shown = 10;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  show();
}

// SEARCH
document.getElementById("search").addEventListener("input",()=>{
  shown = 10;
  show();
});

// FIRST LOAD
shown = 10;
show();

</script>

</body>
</html>
