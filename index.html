<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - MovieBox Pro</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#000; color:#fff; }
        .header { padding:15px; background:#111; border-bottom:3px solid #2ecc71; position:sticky; top:0; z-index:1000; text-align:center; }
        .logo { color:#2ecc71; font-size:26px; font-weight:bold; text-transform:uppercase; margin-bottom:10px; }
        .search-bar { width:90%; max-width:500px; padding:12px; border-radius:10px; border:1px solid #333; background:#222; color:#fff; outline:none; }
        .search-bar:focus { border-color:#2ecc71; }
        
        /* Category Bar */
        .categories { display:flex; overflow-x:auto; padding:15px; gap:10px; white-space:nowrap; scrollbar-width:none; }
        .cat-btn { background:#1a1a1a; padding:8px 18px; border-radius:5px; border:1px solid #333; color:#fff; cursor:pointer; font-size:13px; }
        .cat-btn.active { background:#2ecc71; border-color:#2ecc71; color:#000; font-weight:bold; }

        .container { display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:12px; padding:15px; }
        .movie-card { background:#111; border-radius:8px; overflow:hidden; border:1px solid #222; position:relative; }
        .movie-card img { width:100%; aspect-ratio: 2/3; object-fit:cover; display:block; background:#1a1a1a; }
        .movie-title { padding:8px; font-size:11px; height:30px; overflow:hidden; text-align:center; color:#fff; font-weight:bold; }
        #msg { text-align:center; padding:20px; color:#2ecc71; font-weight:bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">H.Movies Pro</div>
        <input type="text" id="s" class="search-bar" placeholder="Search movies (e.g. Jawan, Joker)...">
    </div>

    <div class="categories">
        <div class="cat-btn active" onclick="load('2026', this)">Trending</div>
        <div class="cat-btn" onclick="load('Action', this)">Action</div>
        <div class="cat-btn" onclick="load('Horror', this)">Horror</div>
        <div class="cat-btn" onclick="load('Adventure', this)">Adventure</div>
        <div class="cat-btn" onclick="load('Bollywood', this)">Bollywood</div>
        <div class="cat-btn" onclick="load('Marvel', this)">Marvel</div>
    </div>

    <div id="msg"></div>
    <div id="out" class="container"></div>

    <script>
        const API_KEY = '61f2249e';

        async function load(q, btn) {
            const grid = document.getElementById('out');
            const msg = document.getElementById('msg');
            
            // UI Update
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            
            msg.innerText = 'Syncing Posters...';
            grid.innerHTML = '';

            try {
                const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&apikey=${API_KEY}`);
                const data = await res.json();

                if (data.Search) {
                    msg.innerText = '';
                    data.Search.forEach(m => {
                        if (m.Poster !== 'N/A') {
                            // Enhanced Proxy to bypass ISP blocking
                            const safeImg = `https://images.weserv.nl/?url=${encodeURIComponent(m.Poster)}&w=300&h=450`;
                            
                            const card = document.createElement('div');
                            card.className = 'movie-card';
                            card.innerHTML = `
                                <img src="${safeImg}" alt="${m.Title}">
                                <div class="movie-title">${m.Title}</div>
                            `;
                            // Redirect to watch page (we'll link this later)
                            card.onclick = () => alert("Selected: " + m.Title);
                            grid.appendChild(card);
                        }
                    });
                } else {
                    msg.innerText = 'No Results Found.';
                }
            } catch (e) {
                msg.innerText = 'Connection Error. Try again.';
            }
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') {
                load(this.value.trim());
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            }
        };

        // Open hot and trending on entry
        window.onload = () => load('2026');
    </script>
</body>
</html>
