<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Official</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #080808; color: white; padding-bottom: 80px; }
        .top-nav { padding: 15px; background: rgba(20, 20, 20, 0.95); position: sticky; top: 0; z-index: 1000; text-align: center; border-bottom: 1px solid #333; }
        .logo { color: #e50914; font-weight: bold; font-size: 26px; margin-bottom: 12px; letter-spacing: 1px; }
        .search-box { background: #2a2d36; border: 1px solid #444; padding: 12px; border-radius: 8px; color: white; width: 90%; outline: none; margin-bottom: 10px; }
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; justify-content: center; }
        .cat-btn { background: #1a1a1a; padding: 8px 16px; border-radius: 4px; font-size: 13px; white-space: nowrap; border: 1px solid #333; color: #ccc; cursor: pointer; }
        .cat-btn:hover { background: #e50914; color: white; border-color: #e50914; }
        .movie-row { display: flex; flex-wrap: wrap; padding: 15px; gap: 15px; justify-content: center; }
        .movie-card { width: 160px; background: #141414; border-radius: 8px; overflow: hidden; position: relative; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-title { font-size: 12px; padding: 10px 5px; text-align: center; font-weight: bold; height: 35px; overflow: hidden; }
        .btn-group { padding: 5px; }
        .btn { display: block; padding: 8px; border-radius: 4px; text-align: center; text-decoration: none; font-weight: bold; color: white; margin-bottom: 5px; font-size: 11px; }
        .watch { background: #e50914; }
        .down { background: #333; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">H.Movies</div>
    <input type="text" id="searchInput" class="search-box" placeholder="Search Movies like MovieBox...">
    <div class="category-bar">
        <div class="cat-btn" onclick="fetchMovies('movie/popular')">Popular</div>
        <div class="cat-btn" onclick="fetchMovies('movie/top_rated')">Top Rated</div>
        <div class="cat-btn" onclick="fetchMovies('trending/movie/week')">Trending</div>
    </div>
</div>

<div id="movie-display" class="movie-row"></div>

<script>
    const API_KEY = '86202476b76a0841f22e848981329124'; // Professional Movie Data Key
    
    async function fetchMovies(path, isSearch = false) {
        const display = document.getElementById('movie-display');
        display.innerHTML = '<p>Loading Movies...</p>';
        
        let url = isSearch 
            ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${path}`
            : `https://api.themoviedb.org/3/${path}?api_key=${API_KEY}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            display.innerHTML = '';
            
            data.results.forEach(movie => {
                if(movie.poster_path) {
                    const poster = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    const id = movie.id;
                    const s1 = `https://vidsrc.me/embed/movie/${id}`;
                    const s2 = `https://vidsrc.xyz/embed/movie/${id}`;

                    display.innerHTML += `
                        <div class="movie-card">
                            <img src="${poster}" alt="${movie.title}">
                            <div class="movie-title">${movie.title}</div>
                            <div class="btn-group">
                                <a href="${s1}" target="_blank" class="btn watch">Server 1</a>
                                <a href="${s2}" target="_blank" class="btn watch" style="background:#444">Server 2</a>
                                <a href="https://dl.vidsrc.xyz/movie/${id}" target="_blank" class="btn down">Download</a>
                            </div>
                        </div>`;
                }
            });
        } catch(e) { display.innerHTML = '<p>Error loading movies.</p>'; }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') fetchMovies(e.target.value, true);
    });

    fetchMovies('movie/popular');
</script>
</body>
</html>
