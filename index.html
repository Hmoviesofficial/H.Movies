<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #111;
}

h1 {
  color: #00ff88;
  font-size: 20px;
}

input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* Movies */
.movies {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.movie {
  min-width: 120px;
  cursor: pointer;
}

.movie img {
  width: 100%;
  border-radius: 10px;
}

/* Popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
}

.popup-content {
  background: #222;
  padding: 20px;
  margin: 100px auto;
  width: 80%;
  text-align: center;
  border-radius: 10px;
}

button {
  margin: 10px;
  padding: 10px;
  border: none;
  background: #00ff88;
  cursor: pointer;
}

#close {
  float: right;
  cursor: pointer;
  color: red;
}
</style>

</head>

<body>

<header>
  <h1>H.MOVIES PRO</h1>
  <input type="text" placeholder="Search movies...">
</header>

<section>
  <h2 style="padding-left:10px;">🔥 Trending</h2>
  <div id="trending" class="movies"></div>
</section>

<!-- Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span id="close">X</span>
    <h3 id="movieTitle"></h3>
    <button id="watchTrailer">▶ Watch Trailer</button>
    <button id="findMovie">🔍 Find Movie</button>
  </div>
</div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG_URL = "https://image.tmdb.org/t/p/w500";

const trendingContainer = document.getElementById("trending");
const popup = document.getElementById("popup");
const closeBtn = document.getElementById("close");
const movieTitle = document.getElementById("movieTitle");

let currentMovie = "";

// Fetch Trending Movies
async function getTrending() {
  const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
  const data = await res.json();
  showMovies(data.results);
}

// Show Movies
function showMovies(movies) {
  trendingContainer.innerHTML = "";

  movies.forEach(movie => {
    if (!movie.poster_path) return;

    const div = document.createElement("div");
    div.classList.add("movie");

    div.innerHTML = `
      <img src="${IMG_URL + movie.poster_path}" />
      <p>${movie.title}</p>
    `;

    div.onclick = () => openPopup(movie.title);

    trendingContainer.appendChild(div);
  });
}

// Open Popup
function openPopup(title) {
  currentMovie = title;
  movieTitle.innerText = title;
  popup.style.display = "block";
}

// Close Popup
closeBtn.onclick = () => popup.style.display = "none";

// Trailer Button
document.getElementById("watchTrailer").onclick = () => {
  window.open(`https://www.youtube.com/results?search_query=${currentMovie} trailer`);
};

// Find Movie Button
document.getElementById("findMovie").onclick = () => {
  window.open(`https://www.google.com/search?q=${currentMovie} full movie`);
};

// Load Movies
getTrending();
</script>

</body>
</html>
