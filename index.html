<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.nav{padding:15px;background:#111;}
.logo{color:#2ecc71;font-size:24px;font-weight:bold;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;padding:15px;
}

.card{
background:#111;border-radius:10px;overflow:hidden;
}

.card img{
width:100%;height:220px;object-fit:cover;
}

.overlay{padding:10px;}

.btn{
background:#2ecc71;color:#000;
padding:5px;border-radius:5px;
text-decoration:none;font-size:12px;
display:inline-block;margin-top:5px;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">H.MOVIES PRO</div>
</div>

<div id="grid" class="grid"></div>

<script>

// 🔥 READY MOVIES DATA (AUTO SHOW)
const movies = [
{
title:"Avengers Endgame",
img:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",
id:"tt4154796"
},
{
title:"Joker",
img:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",
id:"tt7286456"
},
{
title:"Spider Man No Way Home",
img:"https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg",
id:"tt10872600"
},
{
title:"Demon Slayer",
img:"https://image.tmdb.org/t/p/w500/6QxapA4o9Yp1e6tZ1HtV6nRvWmv.jpg",
id:"tt9335498"
},
{
title:"Money Heist",
img:"https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg",
id:"tt6468322"
}
];

// 🔥 RENDER
movies.forEach(m=>{
 const watch = `https://vidsrc.me/embed/movie?imdb=${m.id}`;

 const card = document.createElement('div');
 card.className="card";

 card.innerHTML=`
 <img src="${m.img}">
 <div class="overlay">
   <div>${m.title}</div>
   <a href="${watch}" target="_blank" class="btn">Watch</a>
   <a href="${watch}" target="_blank" class="btn">Download</a>
 </div>
 `;

 document.getElementById('grid').appendChild(card);
});

</script>

</body>
</html>
