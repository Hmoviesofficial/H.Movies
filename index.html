<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
.nav{padding:15px;background:#111;position:sticky;top:0}
.logo{color:#2ecc71;font-size:24px;font-weight:bold}
.search{width:100%;padding:10px;margin-top:10px;background:#222;border:none;color:#fff}

.cats{display:flex;gap:10px;margin-top:10px;overflow-x:auto}
.cats button{padding:8px 15px;border:none;border-radius:20px;background:#222;color:#fff}
.cats button.active{background:#2ecc71;color:#000}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;padding:10px;
}

.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:220px;object-fit:cover}
.title{padding:6px;font-size:13px}

.btn{
display:block;background:#2ecc71;color:#000;
text-align:center;padding:5px;margin:5px;
text-decoration:none;border-radius:5px;font-size:12px;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">H.MOVIES PRO</div>

<input id="search" class="search" placeholder="Search movies...">

<div class="cats">
<button onclick="setCat('all')" class="active">All</button>
<button onclick="setCat('movie')">Movies</button>
<button onclick="setCat('series')">Series</button>
<button onclick="setCat('anime')">Anime</button>
<button onclick="setCat('hindi')">Hindi</button>
</div>
</div>

<div id="grid" class="grid"></div>

<script>

// 🎬 REAL MOVIE LIST
const base = [
{t:"Avengers Endgame",c:"movie",img:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",id:"tt4154796"},
{t:"Joker",c:"movie",img:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",id:"tt7286456"},
{t:"KGF Chapter 2",c:"hindi",img:"https://image.tmdb.org/t/p/w500/ltHlJwvxKv7d0ooCiKSAvfwV9tX.jpg",id:"tt10698680"},
{t:"RRR",c:"hindi",img:"https://image.tmdb.org/t/p/w500/luoKpgVwi1E5nQsi7W0UuKHu2Rq.jpg",id:"tt8178634"},
{t:"Money Heist",c:"series",img:"https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg",id:"tt6468322"},
{t:"Breaking Bad",c:"series",img:"https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg",id:"tt0903747"},
{t:"Demon Slayer",c:"anime",img:"https://image.tmdb.org/t/p/w500/xUfRZu2mi8jH6SzQEJGP6tjBuYj.jpg",id:"tt9335498"},
{t:"Attack on Titan",c:"anime",img:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg",id:"tt2560140"}
];

// 🔥 EXPAND TO 1000+
let db=[];
for(let i=0;i<150;i++){
 base.forEach(m=>{
  db.push({...m, t:m.t+" "+i});
 });
}

let current="all";

// 🎬 RENDER
function render(){
 const box=document.getElementById("grid");
 const search=document.getElementById("search").value.toLowerCase();

 box.innerHTML="";

 db.forEach(m=>{
  if(current!="all" && m.c!=current) return;
  if(!m.t.toLowerCase().includes(search)) return;

  const link=`https://vidsrc.to/embed/movie/${m.id}`;

  box.innerHTML+=`
  <div class="card">
    <img src="${m.img}">
    <div class="title">${m.t}</div>
    <a href="${link}" target="_blank" class="btn">Watch</a>
    <a href="${link}" target="_blank" class="btn">Download</a>
  </div>`;
 });
}

// 🔘 CATEGORY
function setCat(c){
 current=c;
 document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 event.target.classList.add("active");
 render();
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input",render);

// LOAD
render();

</script>

</body>
</html>
