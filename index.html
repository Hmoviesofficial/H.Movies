<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies Official - Fix</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#080808; color:white; }
        .nav { padding:15px; background:#141414; text-align:center; border-bottom:1px solid #333; position:sticky; top:0; z-index:100; }
        .logo { color:#e50914; font-weight:bold; font-size:26px; }
        .search { background:#2a2d36; border:none; padding:12px; border-radius:8px; color:white; width:85%; margin-top:10px; outline:none; }
        .row { display:flex; flex-wrap:wrap; padding:10px; gap:10px; justify-content:center; }
        .card { width:45%; background:#141414; border-radius:10px; margin-bottom:15px; overflow:hidden; border:1px solid #222; text-align:center; }
        .card img { width:100%; height:230px; object-fit:cover; display:block; background:#222; }
        .title { font-size:12px; padding:8px 5px; height:35px; overflow:hidden; font-weight:bold; }
        .btn { display:block; padding:10px; border-radius:5px; text-decoration:none; font-weight:bold; color:white; margin:5px; font-size:11px; background:#e50914; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.Movies</div>
        <input type="text" id="s" class="search" placeholder="Type Movie Name (e.g. Joker)...">
    </div>
    <div id="out" class="row"></div>

    <script>
        // Alternative Database (OMDb) and TMDB mix
        var k = '86202476b76a0841f22e848981329124';

        function load(q) {
            var box = document.getElementById('out');
            box.innerHTML = '<p style="padding:20px;">Loading Movies...</p>';
            
            // Agar search khali hai to trending dikhao, warna search karo
            var url = q 
                ? "https://api.themoviedb.org/3/search/movie?api_key=" + k + "&query=" + encodeURIComponent(q)
                : "https://api.themoviedb.org/3/trending/movie/week?api_key=" + k;

            fetch(url).then(function(res) { return res.json(); }).then(function(data) {
                box.innerHTML = '';
                if(!data.results || data.results.length === 0) {
                    box.innerHTML = '<p>No results found.</p>';
                    return;
                }
                data.results.forEach(function(m) {
                    if(m.poster_path) {
                        // Image ko Proxy ke zariye load karna (VPN ka jhanjhat khatam karne ke liye)
                        var img = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500" + m.poster_path;
                        var watch = "https://vidsrc.to/embed/movie/" + m.id;
                        
                        var item = document.createElement('div');
                        item.className = 'card';
                        item.innerHTML = '<img src="' + img + '" onerror="this.src=\'https://via.placeholder.com/500x750?text=No+Image\'"><div class="title">' + m.title + '</div><a href="' + watch + '" target="_blank" class="btn">Watch Now</a>';
                        box.appendChild(item);
                    }
                });
            }).catch(function(e) {
                box.innerHTML = '<p>Connection Error. Try searching a movie name.</p>';
            });
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') load(e.target.value.trim());
        };
        
        window.onload = function() { load('Action'); }; // Initial search to force data
    </script>
</body>
</html>
