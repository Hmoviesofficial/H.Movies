<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff}
.header{padding:15px;font-size:22px;color:#00ff88;font-weight:bold}
.search{width:90%;margin:10px auto;display:block;padding:12px;border:none;border-radius:10px;background:#111;color:#fff}

.tabs{display:flex;gap:10px;padding:10px;overflow:auto}
.tab{padding:8px 15px;background:#111;border-radius:20px;cursor:pointer}
.tab.active{background:#00ff88;color:#000}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:230px;object-fit:cover}
.title{padding:8px;font-size:14px}

.btns{display:flex;flex-direction:column;gap:5px;padding:8px}
.btn{background:#00ff88;color:#000;padding:8px;text-align:center;border-radius:6px;text-decoration:none}

.load{margin:20px;padding:12px;background:#00ff88;text-align:center;border-radius:10px;color:#000;cursor:pointer}
</style>
</head>

<body>

<div class="header">H.MOVIES PRO</div>

<input class="search" id="search" placeholder="Search movies...">

<div class="tabs">
  <div class="tab active" onclick="setCat('all',this)">All</div>
  <div class="tab" onclick="setCat('movie',this)">Movies</div>
  <div class="tab" onclick="setCat('series',this)">Series</div>
  <div class="tab" onclick="setCat('anime',this)">Anime</div>
  <div class="tab" onclick="setCat('hindi',this)">Hindi</div>
</div>

<div class="grid" id="grid"></div>

<div class="load" onclick="loadMore()">Load More</div>

<script>

// 🎬 DATA
const data = [
{t:"Avengers Endgame",c:"movie",img:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg"},
{t:"Joker",c:"movie",img:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg"},
{t:"Spider Man No Way Home",c:"movie",img:"https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg"},

{t:"Breaking Bad",c:"series",img:"https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg"},
{t:"Money Heist",c:"series",img:"https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg"},
{t:"Stranger Things",c:"series",img:"https://image.tmdb.org/t/p/w500/49WJfeN0moxb9IPfGn8AIqMGskD.jpg"},

{t:"Attack on Titan",c:"anime",img:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg"},
{t:"Demon Slayer",c:"anime",img:"https://image.tmdb.org/t/p/w500/xUfRZu2mi8jH6SzQEJGP6tjBuYj.jpg"},
{t:"Naruto",c:"anime",img:"https://image.tmdb.org/t/p/w500/2y98Rn0lXh6b6cK8d1x3pR5Fh5S.jpg"},

{t:"RRR",c:"hindi",img:"https://image.tmdb.org/t/p/w500/ljHw5eIMnki3HekwkKwCCHsRSbH.jpg"},
{t:"KGF Chapter 2",c:"hindi",img:"https://image.tmdb.org/t/p/w500/khNVygolU0TXCqCqZVdE0RWi8cJ.jpg"},
{t:"Pathaan",c:"hindi",img:"https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg"}
];

let shown = 0;
let cat = "all";

function show(){
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = data.filter(x =>
    (cat==="all" || x.c===cat) &&
    x.t.toLowerCase().includes(search)
  );

  const slice = filtered.slice(0, shown);

  grid.innerHTML = slice.map(m => `
    <div class="card">

      <img src="${m.img}" 
      onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">

      <div class="title">${m.t}</div>

      <div class="btns">

        <button class="btn" onclick="watchMovie('${m.t}')">▶ Watch</button>

        <button class="btn" onclick="downloadMovie('${m.t}')">⬇ Download</button>

        <button class="btn" onclick="hindiMovie('${m.t}')">🇮🇳 Hindi</button>

      </div>
    </div>
  `).join("");
}

// 🎬 FUNCTIONS
function watchMovie(title){
  window.open(`https://www.google.com/search?q=${title}+watch+online`, '_blank');
}

function downloadMovie(title){
  window.open(`https://www.google.com/search?q=${title}+download+720p`, '_blank');
}

function hindiMovie(title){
  window.open(`https://www.google.com/search?q=${title}+hindi+dubbed`, '_blank');
}

// LOAD MORE
function loadMore(){
  shown += 20;
  show();
}

// CATEGORY
function setCat(c,el){
  cat = c;
  shown = 20;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  show();
}

// SEARCH
document.getElementById("search").addEventListener("input",()=>{
  shown = 20;
  show();
});

// FIRST LOAD
shown = 20;
show();

</script>

</body>
</html>
