<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Official</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #080808; color: white; padding-bottom: 80px; }
        .top-nav { padding: 15px; background: #141414; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .logo { color: #e50914; font-weight: bold; font-size: 24px; margin-bottom: 10px; }
        .search-box { background: #2a2d36; border: none; padding: 12px; border-radius: 25px; color: white; width: 90%; outline: none; margin-bottom: 10px; }
        .category-bar { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .cat-btn { background: #2a2d36; padding: 8px 15px; border-radius: 20px; font-size: 12px; white-space: nowrap; border: 1px solid #444; color: white; cursor: pointer; }
        .movie-row { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; justify-content: space-around; }
        .movie-card { width: 45%; background: #1a1a1a; padding: 5px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .movie-card img { width: 100%; height: 180px; border-radius: 8px; object-fit: cover; }
        .movie-title { font-size: 11px; margin: 8px 0; height: 30px; overflow: hidden; font-weight: bold; }
        .btn { display: block; padding: 10px; border-radius: 5px; text-align: center; text-decoration: none; font-weight: bold; color: white; margin-bottom: 5px; font-size: 11px; }
        .watch { background: #e50914; }
        .server2 { background: #444; }
        .down { background: #007bff; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">H.Movies</div>
    <input type="text" id="searchInput" class="search-box" placeholder="Search Movie...">
    <div class="category-bar">
        <div class="cat-btn" onclick="loadMovies('movie')">Home</div>
        <div class="cat-btn" onclick="loadMovies('animation')">Animations</div>
        <div class="cat-btn" onclick="loadMovies('cartoon')">Cartoons</div>
        <div class="cat-btn" onclick="loadMovies('action')">Action</div>
    </div>
</div>

<div id="movie-display" class="movie-row"></div>

<script>
    function loadMovies(q = 'movie') {
        const d = document.getElementById('movie-display');
        d.innerHTML = '<p style="padding:20px; width:100%; text-align:center;">Loading...</p>';
        
        fetch('https://api.tvmaze.com/search/shows?q=' + q)
        .then(r => r.json())
        .then(data => {
            d.innerHTML = '';
            data.forEach(i => {
                const s = i.show;
                const id = s.externals.imdb;
                if(id) {
                    const img = s.image ? s.image.medium : 'https://via.placeholder.com/210x295';
                    d.innerHTML += `
                        <div class="movie-card">
                            <img src="${img}">
                            <div class="movie-title">${s.name}</div>
                            <a href="https://vidsrc.me/embed/movie?imdb=${id}" target="_blank" class="btn watch">Watch S1</a>
                            <a href="https://vidsrc.xyz/embed/movie/${id}" target="_blank" class="btn server2">Watch S2</a>
                            <a href="https://dl.vidsrc.xyz/movie/${id}" target="_blank" class="btn down">Download</a>
                        </div>`;
                }
            });
        });
    }

    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if(e.key === 'Enter') loadMovies(this.value);
    });

    loadMovies();
</script>
</body>
</html>
