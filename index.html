<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - MovieBox Edition</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#080808; color:white; }
        .header { padding:15px; background:#111; border-bottom:2px solid #e50914; position:sticky; top:0; z-index:1000; text-align:center; }
        .logo { color:#e50914; font-size:28px; font-weight:bold; margin-bottom:10px; }
        .search-bar { width:90%; max-width:500px; padding:12px; border-radius:25px; border:none; background:#222; color:white; outline:none; font-size:15px; }
        
        /* Categories Style */
        .categories { display:flex; overflow-x:auto; padding:15px; gap:10px; white-space:nowrap; scrollbar-width:none; }
        .cat-btn { background:#1a1a1a; padding:8px 20px; border-radius:20px; border:1px solid #333; color:#bbb; cursor:pointer; font-weight:bold; transition:0.3s; }
        .cat-btn:hover, .cat-btn.active { background:#e50914; color:white; border-color:#e50914; }

        .container { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:15px; padding:15px; }
        .movie-card { background:#111; border-radius:10px; overflow:hidden; border:1px solid #222; transition:0.3s; cursor:pointer; }
        .movie-card:hover { transform: translateY(-5px); border-color:#e50914; }
        .movie-card img { width:100%; aspect-ratio: 2/3; object-fit:cover; display:block; background:#1a1a1a; }
        .movie-title { padding:10px; font-size:12px; height:32px; overflow:hidden; font-weight:600; text-align:center; color:#eee; }
        #status { text-align:center; padding:20px; color:#888; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">H.MOVIES</div>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search movies, shows...">
    </div>

    <div class="categories">
        <div class="cat-btn active" onclick="loadMovies('Trending')">Trending</div>
        <div class="cat-btn" onclick="loadMovies('Action')">Action</div>
        <div class="cat-btn" onclick="loadMovies('Horror')">Horror</div>
        <div class="cat-btn" onclick="loadMovies('Comedy')">Comedy</div>
        <div class="cat-btn" onclick="loadMovies('Marvel')">Marvel</div>
        <div class="cat-btn" onclick="loadMovies('Bollywood')">Bollywood</div>
        <div class="cat-btn" onclick="loadMovies('Cartoon')">Animation</div>
    </div>

    <div id="status"></div>
    <div id="movieGrid" class="container"></div>

    <script>
        const API_KEY = '61f2249e'; // OMDb API

        async function loadMovies(query) {
            const grid = document.getElementById('movieGrid');
            const status = document.getElementById('status');
            
            status.innerText = `Loading ${query}...`;
            grid.innerHTML = '';

            try {
                const response = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=${API_KEY}`);
                const data = await response.json();

                if (data.Search) {
                    status.innerText = '';
                    data.Search.forEach(movie => {
                        if (movie.Poster !== 'N/A') {
                            // Using Image Proxy for No-VPN access
                            const safeImg = `https://images.weserv.nl/?url=${encodeURIComponent(movie.Poster)}`;
                            
                            const card = document.createElement('div');
                            card.className = 'movie-card';
                            card.innerHTML = `
                                <img src="${safeImg}" alt="${movie.Title}">
                                <div class="movie-title">${movie.Title}</div>
                            `;
                            // Link to Watch page (which we'll make tomorrow)
                            card.onclick = () => alert("Title: " + movie.Title + "\nWatch/Download links will be added tomorrow!");
                            grid.appendChild(card);
                        }
                    });
                } else {
                    status.innerText = 'No movies found in this category.';
                }
            } catch (error) {
                status.innerText = 'Connection error. Please check internet.';
            }
        }

        // Search logic
        document.getElementById('searchInput').onkeypress = function(e) {
            if(e.key === 'Enter') {
                loadMovies(this.value.trim());
                // Remove active class from buttons
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            }
        };

        // Category button active state
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                loadMovies(this.innerText);
            }
        });

        // Initial Load
        window.onload = () => loadMovies('2025');
    </script>
</body>
</html>
