<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Official</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #080808; color: white; overflow-x: hidden; padding-bottom: 80px; }
        .top-nav { padding: 15px; background: #141414; position: sticky; top: 0; z-index: 1000; }
        .header-row { display: flex; align-items: center; margin-bottom: 10px; }
        .logo { color: #e50914; font-weight: bold; font-size: 22px; margin-right: 15px; }
        .search-box { background: #2a2d36; border: none; padding: 10px 15px; border-radius: 20px; color: white; width: 65%; outline: none; }
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: #2a2d36; color: white; padding: 6px 15px; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid #444; }
        .cat-btn.active { background: #e50914; border-color: #e50914; }
        .section-title { padding: 20px 15px 10px; font-size: 18px; font-weight: bold; }
        .movie-row { display: flex; overflow-x: auto; padding: 0 15px; gap: 15px; flex-wrap: wrap; justify-content: space-between; }
        .movie-card { width: 45%; position: relative; margin-bottom: 25px; background: #1a1a1a; padding: 5px; border-radius: 8px; }
        .movie-card img { width: 100%; height: 200px; border-radius: 6px; object-fit: cover; }
        .movie-title { font-size: 11px; margin: 8px 0; text-align: center; color: #fff; height: 30px; overflow: hidden; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .btn { padding: 8px 0; font-size: 11px; border-radius: 4px; text-align: center; text-decoration: none; font-weight: bold; color: white; }
        .watch1 { background: #e50914; }
        .watch2 { background: #007bff; }
        .down { background: #333; border: 1px solid #555; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #141414; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="header-row">
            <div class="logo">H.Movies</div>
            <input type="text" id="searchInput" class="search-box" placeholder="Search movies...">
        </div>
        <div class="category-bar">
            <div class="cat-btn active" onclick="filterMovies('movie', this)">All</div>
            <div class="cat-btn" onclick="filterMovies('animation', this)">Animations</div>
            <div class="cat-btn" onclick="filterMovies('cartoon', this)">Cartoons</div>
            <div class="cat-btn" onclick="filterMovies('action', this)">Action</div>
        </div>
    </div>

    <div class="section-title" id="title-text">Trending Content</div>
    <div id="movie-display" class="movie-row"></div>

    <div class="bottom-nav">
        <div style="color:#e50914">🏠<br>Home</div>
        <div>📚<br>Novel</div>
        <div>⬇️<br>Down</div>
        <div>👤<br>Me</div>
    </div>

    <script>
        const movieDisplay = document.getElementById('movie-display');
        const searchInput = document.getElementById('searchInput');
        const titleText = document.getElementById('title-text');

        function loadMovies(query = 'movie') {
            movieDisplay.innerHTML = '<p style="padding:20px">Searching...</p>';
            fetch(`https://api.tvmaze.com/search/shows?q=${query}`)
            .then(res => res.json())
            .then(data => {
                movieDisplay.innerHTML = ''; 
                data.forEach((item) => {
                    const show = item.show;
                    const imdbId = show.externals.imdb;
                    const img = show.image ? show.image.medium : 'https://via.placeholder.com/130x190';
                    
                    if (imdbId) {
                        movieDisplay.innerHTML += `
                        <div class="movie-card">
                            <img src="${img}">
                            <div class="movie-title">${show.name}</div>
                            <div class="btn-group">
                                <a href="https://vidsrc.me/embed/movie?imdb=${imdbId}" target="_blank" class="btn watch1">Server 1</a>
                                <a href="https://vidsrc.cc/v2/embed/movie/${imdbId}" target="_blank" class="btn watch2">Server 2</a>
                                <a href="https://dl.vidsrc.xyz/movie/${imdbId}" target="_blank" class="btn down">Download</a>
                            </div>
                        </div>`;
                    }
                });
            });
        }

        function filterMovies(type, element) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            titleText.innerText = type.toUpperCase() + " Collections";
            loadMovies(type);
        }

        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                titleText.innerText = "Results: " + searchInput.value;
                loadMovies(searchInput.value);
            }
        });

        loadMovies();
    </script>
</body>
</html>
