<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{
margin:0;
background:#0b0b0f;
color:#fff;
font-family:sans-serif;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:100;
}

.logo{
color:#00ff88;
font-size:22px;
font-weight:bold;
}

.search{
background:#1c1c25;
border:none;
padding:10px;
color:#fff;
border-radius:8px;
}

/* BANNER */
.banner{
height:65vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
}

.banner h1{
font-size:32px;
text-shadow:0 0 10px #000;
}

.banner button{
background:#00ff88;
border:none;
padding:10px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* ARROWS */
.arrow{
position:absolute;
top:50%;
font-size:30px;
cursor:pointer;
color:#fff;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:50%;
}

.left{left:10px;}
.right{right:10px;}

/* ROWS */
.row{
padding:10px;
}

.row h2{
margin-left:10px;
color:#00ff88;
}

/* MOVIES */
.movies{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px;
}

.card{
min-width:150px;
transition:0.3s;
}

.card img{
width:100%;
border-radius:10px;
}

.card:hover{
transform:scale(1.1);
}

/* PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:9999;
}

.player iframe{
width:100%;
height:100%;
}

.close{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
border:none;
padding:10px;
}

/* SCROLL BAR */
::-webkit-scrollbar{
height:6px;
}
::-webkit-scrollbar-thumb{
background:#00ff88;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">H.MOVIES PRO</div>
<input id="search" class="search" placeholder="Search movies...">
</div>

<div id="banner" class="banner"></div>

<div class="row">
<h2>🔥 Trending</h2>
<div id="trending" class="movies"></div>
</div>

<div class="row">
<h2>🎬 Movies</h2>
<div id="movies" class="movies"></div>
</div>

<div class="row">
<h2>📺 Series</h2>
<div id="series" class="movies"></div>
</div>

<script>

const API="https://api.themoviedb.org/3";
const KEY="f409489a42d61f514484fa959f76fec7";

/* FETCH */
async function get(url){
 let res=await fetch(url);
 return res.json();
}

/* BANNER SLIDER */
let bannerMovies=[];
let current=0;

async function loadBanner(){
 let data=await get(`${API}/trending/movie/week?api_key=${KEY}`);
 bannerMovies=data.results.slice(0,5);
 showBanner();
}

function showBanner(){
 let m=bannerMovies[current];
 let banner=document.getElementById("banner");

 banner.style.backgroundImage=
 `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;

 banner.innerHTML=`
 <div>
 <h1>${m.title}</h1>
 <button onclick="play('${m.title} trailer')">▶ Play</button>
 </div>

 <div class="arrow left" onclick="prev()">⬅</div>
 <div class="arrow right" onclick="next()">➡</div>
 `;
}

function next(){
 current=(current+1)%bannerMovies.length;
 showBanner();
}

function prev(){
 current=(current-1+bannerMovies.length)%bannerMovies.length;
 showBanner();
}

/* AUTO SLIDE */
setInterval(()=>next(),5000);

/* LOAD ROW */
async function loadRow(url,id){
 let data=await get(url);
 let box=document.getElementById(id);

 data.results.forEach(m=>{
  if(!m.poster_path) return;

  let title=m.title||m.name;

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
  <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
  `;

  div.onclick=()=>play(title+" trailer");

  box.appendChild(div);
 });
}

/* PLAYER */
function play(q){
 let p=document.createElement("div");
 p.className="player";

 p.innerHTML=`
 <button class="close" onclick="this.parentElement.remove()">X</button>

 <iframe 
 src="https://www.youtube.com/embed?listType=search&list=${q}" 
 allowfullscreen>
 </iframe>
 `;

 document.body.appendChild(p);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", async e=>{
 let q=e.target.value;
 if(q.length<2) return;

 let data=await get(`${API}/search/multi?api_key=${KEY}&query=${q}`);

 document.getElementById("trending").innerHTML="";
 document.getElementById("movies").innerHTML="";
 document.getElementById("series").innerHTML="";

 data.results.forEach(m=>{
  if(!m.poster_path) return;

  let title=m.title||m.name;

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">`;

  div.onclick=()=>play(title+" trailer");

  document.getElementById("movies").appendChild(div);
 });
});

/* INIT */
loadBanner();
loadRow(`${API}/trending/all/week?api_key=${KEY}`,"trending");
loadRow(`${API}/discover/movie?api_key=${KEY}`,"movies");
loadRow(`${API}/discover/tv?api_key=${KEY}`,"series");

</script>

</body>
</html>
