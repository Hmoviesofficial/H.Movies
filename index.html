<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: linear-gradient(90deg, #000, #111);
}

h1 {
  color: #00ff88;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
  width: 50%;
}

/* HERO */
.hero {
  height: 60vh;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.hero h2 {
  font-size: 28px;
}

/* MOVIES */
.movies {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 15px;
}

.movies::-webkit-scrollbar {
  display: none;
}

.movie {
  min-width: 160px;
  transition: transform 0.3s;
}

.movie:hover {
  transform: scale(1.1);
}

.movie img {
  width: 100%;
  height: 230px;
  object-fit: cover;
  border-radius: 12px;
}

.movie p {
  text-align: center;
  font-size: 14px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
}

.popup-content {
  background: #1a1a1a;
  padding: 20px;
  margin: 120px auto;
  width: 80%;
  text-align: center;
  border-radius: 10px;
}

button {
  margin: 10px;
  padding: 10px 15px;
  border: none;
  background: #00ff88;
  border-radius: 6px;
  cursor: pointer;
}

#close {
  float: right;
  color: red;
  cursor: pointer;
}
</style>

</head>

<body>

<header>
  <h1>H.MOVIES PRO</h1>
  <input id="search" placeholder="Search movies...">
</header>

<!-- HERO -->
<div id="hero" class="hero">
  <h2 id="heroTitle"></h2>
</div>

<!-- TRENDING -->
<h2 style="padding-left:15px;">🔥 Trending</h2>
<div id="trending" class="movies"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span id="close">X</span>
    <h3 id="movieTitle"></h3>
    <button id="watchTrailer">▶ Watch Trailer</button>
    <button id="findMovie">🔍 Find Movie</button>
  </div>
</div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";

const trending = document.getElementById("trending");
const hero = document.getElementById("hero");
const heroTitle = document.getElementById("heroTitle");

let currentMovie = "";

// FETCH TRENDING
async function getMovies() {
  const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
  const data = await res.json();

  showHero(data.results[0]);
  showMovies(data.results);
}

// HERO SECTION
function showHero(movie) {
  hero.style.backgroundImage = `url(${IMG + movie.backdrop_path})`;
  heroTitle.innerText = movie.title;
}

// SHOW MOVIES
function showMovies(movies) {
  trending.innerHTML = "";

  movies.forEach(movie => {
    if (!movie.poster_path) return;

    const div = document.createElement("div");
    div.classList.add("movie");

    div.innerHTML = `
      <img src="${IMG + movie.poster_path}">
      <p>${movie.title}</p>
    `;

    div.onclick = () => openPopup(movie.title);

    trending.appendChild(div);
  });
}

// POPUP
function openPopup(title) {
  currentMovie = title;
  document.getElementById("movieTitle").innerText = title;
  document.getElementById("popup").style.display = "block";
}

document.getElementById("close").onclick = () => {
  document.getElementById("popup").style.display = "none";
};

// BUTTONS
document.getElementById("watchTrailer").onclick = () => {
  window.open(`https://www.youtube.com/results?search_query=${currentMovie} trailer`);
};

document.getElementById("findMovie").onclick = () => {
  window.open(`https://www.google.com/search?q=${currentMovie} full movie`);
};

getMovies();
</script>

</body>
</html>
