<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Official</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#000; color:white; text-align:center; }
        .nav { padding:20px; background:#111; border-bottom:3px solid red; }
        .search { width:80%; padding:15px; margin-top:10px; border-radius:25px; border:none; outline:none; background:#222; color:white; }
        .row { display:flex; flex-wrap:wrap; padding:20px; gap:10px; justify-content:center; }
        .card { width:150px; background:#111; border-radius:10px; overflow:hidden; border:1px solid #333; }
        .card img { width:100%; height:220px; object-fit:cover; }
        .btn { display:block; background:red; color:white; text-decoration:none; padding:8px; font-weight:bold; font-size:11px; margin:5px; border-radius:4px; }
    </style>
</head>
<body>
    <div class="nav">
        <h2 style="color:red;margin:0;">H.MOVIES</h2>
        <input type="text" id="s" class="search" placeholder="Type Movie Name & Press Enter...">
    </div>
    <div id="out" class="row">Type "Avatar" and press Enter to start...</div>

    <script>
        function load(q) {
            var box = document.getElementById('out');
            box.innerHTML = 'Searching Global Database...';
            // Using a very stable API key and search logic
            fetch("https://www.omdbapi.com/?s=" + encodeURIComponent(q) + "&apikey=61f2249e")
            .then(r => r.json()).then(data => {
                box.innerHTML = '';
                if(data.Search) {
                    data.Search.forEach(m => {
                        var watch = "https://vidsrc.to/embed/movie/" + m.imdbID;
                        box.innerHTML += `
                            <div class="card">
                                <img src="${m.Poster}">
                                <div style="font-size:12px;padding:5px;">${m.Title}</div>
                                <a href="${watch}" target="_blank" class="btn">WATCH / DOWNLOAD</a>
                            </div>`;
                    });
                } else { box.innerHTML = "No movies found. Try another name."; }
            }).catch(e => { box.innerHTML = "Connection Error. Try VPN."; });
        }
        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') load(this.value);
        }
    </script>
</body>
</html>
