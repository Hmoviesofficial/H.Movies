<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Official</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #080808; color: white; padding-bottom: 80px; }
        .top-nav { padding: 15px; background: #141414; position: sticky; top: 0; z-index: 1000; }
        .logo { color: #e50914; font-weight: bold; font-size: 24px; margin-bottom: 10px; text-align: center; }
        .search-box { background: #2a2d36; border: none; padding: 12px; border-radius: 25px; color: white; width: 92%; outline: none; display: block; margin: 0 auto; }
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-btn { background: #2a2d36; padding: 8px 18px; border-radius: 20px; font-size: 13px; white-space: nowrap; border: 1px solid #444; color: white; cursor: pointer; }
        .movie-row { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; justify-content: space-around; }
        .movie-card { width: 45%; background: #1a1a1a; padding: 5px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .movie-card img { width: 100%; height: 210px; border-radius: 8px; object-fit: cover; }
        .movie-title { font-size: 12px; margin: 8px 0; text-align: center; height: 35px; overflow: hidden; font-weight: bold; }
        .btn { display: block; padding: 10px; border-radius: 5px; text-align: center; text-decoration: none; font-weight: bold; color: white; margin-bottom: 5px; font-size: 12px; }
        .watch { background: #e50914; }
        .server2 { background: #444; }
        .down { background: #007bff; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">H.Movies</div>
    <input type="text" id="searchInput" class="search-box" placeholder="Search Movie Name...">
    <div class="category-bar">
        <div class="cat-btn" onclick="loadMovies('movie')">Trending</div>
        <div class="cat-btn" onclick="loadMovies('animation')">Animations</div>
        <div class="cat-btn" onclick="loadMovies('cartoon')">Cartoons</div>
        <div class="cat-btn" onclick="loadMovies('horror')">Horror</div>
        <div class="cat-btn" onclick="loadMovies('action')">Action</div>
    </div>
</div>

<div id="movie-display" class="movie-row"></div>

<script>
    function loadMovies(query = 'movie') {
        const display = document.getElementById('movie-display');
        display.innerHTML = '<p style="padding:20px; text-align:center;">Loading Content...</p>';
        
        fetch(`https://api.tvmaze.com/search/shows?q=${query}`)
        .then(res => res.json())
        .then(data => {
            display.innerHTML = '';
            if(data.length === 0) {
                display.innerHTML = '<p style="padding:20px">No results found.</p>';
                return;
            }
            data.forEach(item => {
                const show = item.show;
                const imdb = show.externals.imdb;
                if(imdb) {
                    const s1 = "https://vidsrc.me/embed/movie?imdb=" + imdb;
                    const s2 = "https://vidsrc.xyz/embed/movie/" + imdb;
                    const d1 = "https://dl.vidsrc.xyz/movie/" + imdb;
                    
                    display.innerHTML += `
                        <div class="movie-card">
                            <img src="${show.image ? show.image.medium : 'https://via.placeholder.com/210x295'}">
                            <div class="movie-title">${show.name}</div>
                            <a href="${s1}" target="_blank" class="btn watch">Server 1</a>
                            <a href="${s2}" target="_blank" class="btn server2">Server 2</a>
                            <a href="${d1}" target="_blank" class="btn down">Download</a>
                        </div>`;
                }
            });
        });
    }

    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if(e.key === 'Enter') {
            loadMovies(this.value);
        }
    });

    // Pehli baar load karne ke liye
    window.onload = function() {
        loadMovies('movie');
    };
</script>
</body>
</html>
