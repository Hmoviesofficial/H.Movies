<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Official</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #080808; color: white; padding-bottom: 80px; }
        .top-nav { padding: 15px; background: #141414; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .logo { color: #e50914; font-weight: bold; font-size: 28px; margin-bottom: 10px; }
        .search-box { background: #2a2d36; border: none; padding: 12px; border-radius: 8px; color: white; width: 90%; outline: none; margin-bottom: 10px; }
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; justify-content: center; }
        .cat-btn { background: #1a1a1a; padding: 8px 16px; border-radius: 4px; font-size: 13px; border: 1px solid #333; color: white; cursor: pointer; }
        .movie-row { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; justify-content: center; }
        .movie-card { width: 45%; background: #141414; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        .movie-title { font-size: 11px; padding: 8px; text-align: center; height: 30px; overflow: hidden; }
        .btn { display: block; padding: 8px; border-radius: 4px; text-align: center; text-decoration: none; font-weight: bold; color: white; margin: 5px; font-size: 11px; }
        .watch { background: #e50914; }
        .down { background: #333; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">H.Movies</div>
    <input type="text" id="searchInput" class="search-box" placeholder="Search Movie...">
    <div class="category-bar">
        <div class="cat-btn" onclick="fetchMovies('movie/popular')">Popular</div>
        <div class="cat-btn" onclick="fetchMovies('movie/top_rated')">Top Rated</div>
        <div class="cat-btn" onclick="fetchMovies('trending/movie/week')">Trending</div>
    </div>
</div>

<div id="movie-display" class="movie-row"></div>

<script>
    // Stable API Key
    const k = '86202476b76a0841f22e848981329124'; 

    function fetchMovies(path, search = false) {
        const display = document.getElementById('movie-display');
        display.innerHTML = '<p>Loading...</p>';
        
        let url = search 
            ? `https://api.themoviedb.org/3/search/movie?api_key=${k}&query=${path}`
            : `https://api.themoviedb.org/3/${path}?api_key=${k}`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            display.innerHTML = '';
            data.results.forEach(m => {
                if(m.poster_path) {
                    const img = `https://image.tmdb.org/t/p/w500${m.poster_path}`;
                    const s1 = `https://vidsrc.me/embed/movie/${m.id}`;
                    const s2 = `https://vidsrc.xyz/embed/movie/${m.id}`;

                    display.innerHTML += `
                        <div class="movie-card">
                            <img src="${img}">
                            <div class="movie-title">${m.title}</div>
                            <a href="${s1}" target="_blank" class="btn watch">Server 1</a>
                            <a href="${s2}" target="_blank" class="btn watch" style="background:#444">Server 2</a>
                            <a href="https://dl.vidsrc.xyz/movie/${m.id}" target="_blank" class="btn down">Download</a>
                        </div>`;
                }
            });
        }).catch(() => { display.innerHTML = '<p>Internet Slow? Try again.</p>'; });
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') fetchMovies(e.target.value, true);
    });

    fetchMovies('movie/popular');
</script>
</body>
</html>
