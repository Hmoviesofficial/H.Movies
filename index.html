<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}

.nav{padding:15px;background:#111;position:sticky;top:0;}
.logo{color:#2ecc71;font-size:24px;font-weight:bold;}

.search{
width:100%;padding:10px;margin-top:10px;
background:#222;border:none;border-radius:8px;color:#fff;
}

.cats{display:flex;gap:10px;margin-top:10px;overflow-x:auto;}
.c-btn{padding:8px 15px;background:#222;border-radius:20px;cursor:pointer;}
.c-btn.active{background:#2ecc71;color:#000;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;padding:12px;
}

.card{background:#111;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:220px;object-fit:cover;}

.overlay{padding:8px;}
.btn{
background:#2ecc71;color:#000;
padding:5px;border-radius:5px;
font-size:12px;text-decoration:none;
margin-right:5px;
}

.load{
width:90%;margin:15px auto;
display:block;padding:12px;
background:#2ecc71;border:none;border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">H.MOVIES PRO</div>

<input id="search" class="search" placeholder="Search movies...">

<div class="cats">
<div class="c-btn active" onclick="setType('movie',this)">Movies</div>
<div class="c-btn" onclick="setType('tv',this)">Series</div>
<div class="c-btn" onclick="setAnime(this)">Anime</div>
<div class="c-btn" onclick="setHindi(this)">Hindi</div>
</div>
</div>

<div id="grid" class="grid"></div>
<button class="load" onclick="loadMore()">Load More</button>

<script>

const API_KEY = "YOUR_API_KEY";

let page = 1;
let type = "movie";
let query = "";
let lang = "";

function setType(t,btn){
 type = t;
 query = "";
 lang = "";
 page = 1;
 document.getElementById('grid').innerHTML="";
 setActive(btn);
 load();
}

function setAnime(btn){
 type = "tv";
 query = "anime";
 lang = "";
 page = 1;
 document.getElementById('grid').innerHTML="";
 setActive(btn);
 load();
}

function setHindi(btn){
 type = "movie";
 query = "";
 lang = "hi"; // Hindi language filter
 page = 1;
 document.getElementById('grid').innerHTML="";
 setActive(btn);
 load();
}

function setActive(btn){
 document.querySelectorAll('.c-btn').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
}

async function load(){

 let url;

 if(query){
  url = `https://api.themoviedb.org/3/search/${type}?query=${query}&page=${page}&api_key=${API_KEY}`;
 } 
 else if(lang){
  url = `https://api.themoviedb.org/3/discover/movie?with_original_language=hi&page=${page}&api_key=${API_KEY}`;
 }
 else{
  url = `https://api.themoviedb.org/3/discover/${type}?primary_release_date.gte=2010-01-01&sort_by=popularity.desc&page=${page}&api_key=${API_KEY}`;
 }

 try{
  const res = await fetch(url);
  const data = await res.json();

  data.results.forEach(m=>{
   if(!m.poster_path) return;

   const img = "https://image.tmdb.org/t/p/w500"+m.poster_path;
   const title = m.title || m.name;

   const watch = `https://vidsrc.me/embed/${type}/${m.id}`;

   const card = document.createElement('div');
   card.className="card";

   card.innerHTML = `
   <img src="${img}">
   <div class="overlay">
     <div>${title}</div>
     <a href="${watch}" target="_blank" class="btn">Watch</a>
     <a href="${watch}" target="_blank" class="btn">Download</a>
   </div>
   `;

   document.getElementById('grid').appendChild(card);
  });

 }catch{
  document.getElementById('grid').innerHTML="<p style='color:red'>Error loading</p>";
 }
}

function loadMore(){
 page++;
 load();
}

document.getElementById("search").addEventListener("keypress", e=>{
 if(e.key==="Enter"){
  query = e.target.value;
  page = 1;
  document.getElementById('grid').innerHTML="";
  load();
 }
});

window.onload = load;

</script>

</body>
</html>
