<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies Official</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#080808; color:white; padding-bottom:80px; }
        .nav { padding:15px; background:#141414; position:sticky; top:0; z-index:100; text-align:center; }
        .logo { color:#e50914; font-weight:bold; font-size:26px; margin-bottom:10px; }
        .search { background:#2a2d36; border:none; padding:12px; border-radius:8px; color:white; width:85%; outline:none; }
        .cats { display:flex; gap:10px; overflow-x:auto; padding:10px; justify-content:center; }
        .btn-c { background:#1a1a1a; padding:8px 15px; border-radius:5px; border:1px solid #333; color:white; font-size:13px; }
        .row { display:flex; flex-wrap:wrap; padding:10px; gap:10px; justify-content:space-around; }
        .card { width:45%; background:#141414; border-radius:10px; margin-bottom:15px; overflow:hidden; border:1px solid #222; text-align:center; }
        .card img { width:100%; height:200px; object-fit:cover; }
        .title { font-size:11px; padding:5px; height:30px; overflow:hidden; font-weight:bold; }
        .act { display:block; padding:10px; border-radius:5px; text-decoration:none; font-weight:bold; color:white; margin:5px; font-size:11px; background:#e50914; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">H.Movies</div>
    <input type="text" id="s" class="search" placeholder="Search Movies...">
    <div class="cats">
        <button class="btn-c" onclick="load('movie/popular')">Popular</button>
        <button class="btn-c" onclick="load('trending/movie/week')">Trending</button>
    </div>
</div>

<div id="out" class="row"></div>

<script>
    const key = '86202476b76a0841f22e848981329124';

    function load(path, isS = false) {
        const box = document.getElementById('out');
        box.innerHTML = '<p>Loading Movies...</p>';
        
        let url = isS 
            ? `https://api.themoviedb.org/3/search/movie?api_key=${key}&query=${path}`
            : `https://api.themoviedb.org/3/${path}?api_key=${key}`;

        fetch(url)
        .then(r => r.json())
        .then(data => {
            box.innerHTML = '';
            data.results.forEach(m => {
                if(m.poster_path) {
                    const img = `https://image.tmdb.org/t/p/w500${m.poster_path}`;
                    box.innerHTML += `
                        <div class="card">
                            <img src="${img}">
                            <div class="title">${m.title}</div>
                            <a href="https://vidsrc.me/embed/movie/${m.id}" target="_blank" class="act">Watch Now</a>
                            <a href="https://dl.vidsrc.xyz/movie/${m.id}" target="_blank" class="act" style="background:#333">Download</a>
                        </div>`;
                }
            });
        }).catch(e => { box.innerHTML = '<p>Error! Try Refreshing.</p>'; });
    }

    document.getElementById('s').onkeypress = (e) => {
        if(e.key === 'Enter') load(e.target.value, true);
    };

    load('movie/popular');
</script>
</body>
</html>
