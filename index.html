<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies Pro - Global Cinema</title>
    <style>
        body { margin:0; font-family: sans-serif; background:#050505; color:#fff; text-align:center; }
        .nav { padding:15px; background:#111; border-bottom:3px solid #2ecc71; position:sticky; top:0; z-index:100; }
        .logo { color:#2ecc71; font-size:26px; font-weight:bold; margin-bottom:10px; }
        .search { width:90%; padding:14px; border-radius:10px; border:none; background:#222; color:#fff; outline:none; font-size:16px; }
        .cats { display:flex; overflow-x:auto; padding:12px; gap:10px; justify-content:center; }
        .c-btn { background:#1a1a1a; padding:10px 20px; border-radius:30px; border:1px solid #333; cursor:pointer; color:#fff; font-size:13px; white-space:nowrap; transition:0.3s; }
        .c-btn.active { background:#2ecc71; color:#000; font-weight:bold; border-color:#2ecc71; }
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:15px; padding:15px; }
        .card { background:#111; border-radius:12px; border:1px solid #222; overflow:hidden; transition: 0.3s; }
        .card:hover { border-color:#2ecc71; transform: translateY(-5px); }
        .card img { width:100%; height:210px; object-fit:cover; display:block; background:#1a1a1a; }
        .info { padding:10px; }
        .title { font-size:12px; font-weight:bold; height:34px; overflow:hidden; margin-bottom:8px; line-height:1.4; }
        .play-btn { display:block; background:#2ecc71; color:#000; font-size:12px; padding:8px; text-decoration:none; border-radius:6px; font-weight:bold; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.MOVIES PRO</div>
        <input type="text" id="s" class="search" placeholder="Search 2010-2026 Movies, Seasons...">
        <div class="cats">
            <div class="c-btn active" onclick="load('2025', this)">Trending</div>
            <div class="c-btn" onclick="load('Animation', this)">Animated</div>
            <div class="c-btn" onclick="load('Series', this)">Seasons</div>
            <div class="c-btn" onclick="load('Bollywood', this)">Bollywood</div>
        </div>
    </div>
    <div id="out" class="grid">Syncing World Cinema...</div>

    <script>
        // Multiple Backup Keys taake agar ek block ho to dusri chale
        const keys = ['61f2249e', 'd9931390', 'cc75685a', 'fc1fef96'];
        let currentKey = 0;

        async function load(q, btn) {
            const box = document.getElementById('out');
            if(btn) {
                document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            box.innerHTML = '<div style="color:#2ecc71">Connecting to Secure Server...</div>';

            try {
                const url = `https://www.omdbapi.com/?s=${encodeURIComponent(q)}&apikey=${keys[currentKey]}&y=2010-2026`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.Response === "True") {
                    box.innerHTML = '';
                    data.Search.forEach(m => {
                        if(m.Poster !== 'N/A') {
                            const proxyImg = "https://images.weserv.nl/?url=" + encodeURIComponent(m.Poster);
                            // Direct Watch/Download Player link
                            const watchLink = `https://vidsrc.me/embed/${m.Type === 'series' ? 'tv' : 'movie'}?imdb=${m.imdbID}`;
                            
                            const item = document.createElement('div');
                            item.className = 'card';
                            item.innerHTML = `
                                <img src="${proxyImg}" loading="lazy">
                                <div class="info">
                                    <div class="title">${m.Title}</div>
                                    <a href="${watchLink}" target="_blank" class="play-btn">WATCH / DOWNLOAD</a>
                                </div>
                            `;
                            box.appendChild(item);
                        }
                    });
                } else if (data.Error === "Request limit reached!") {
                    currentKey = (currentKey + 1) % keys.length;
                    load(q);
                } else {
                    box.innerHTML = "No Results. Try another name.";
                }
            } catch (e) {
                box.innerHTML = "<div style='color:red'>Connection Blocked by ISP. Use a different Internet or SIM.</div>";
            }
        }

        document.getElementById('s').onkeypress = (e) => { 
            if(e.key==='Enter') load(e.target.value); 
        };
        
        window.onload = () => load('2025');
    </script>
</body>
</html>
