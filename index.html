<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies - Stream & Download</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #080808; color: white; overflow-x: hidden; padding-bottom: 80px; }
        .top-nav { padding: 15px; display: flex; align-items: center; background: #141414; position: sticky; top: 0; z-index: 1000; }
        .logo { color: #e50914; font-weight: bold; font-size: 20px; margin-right: 15px; }
        .search-box { background: #2a2d36; border: none; padding: 10px 15px; border-radius: 20px; color: white; width: 70%; }
        .hero { width: 100%; height: 250px; background: url('https://images.alphacoders.com/131/1314352.jpeg') center/cover; position: relative; }
        .hero-overlay { position: absolute; bottom: 0; width: 100%; height: 100%; background: linear-gradient(transparent, #080808); padding: 80px 20px 20px; box-sizing: border-box; }
        .section-title { padding: 20px 15px 10px; font-size: 18px; font-weight: bold; }
        .movie-row { display: flex; overflow-x: auto; padding: 0 15px; gap: 15px; }
        .movie-row::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 130px; position: relative; }
        .movie-card img { width: 130px; height: 190px; border-radius: 8px; object-fit: cover; border: 1px solid #333; }
        .rank-num { position: absolute; top: -5px; left: -5px; background: #e50914; color: white; font-weight: bold; width: 25px; height: 25px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .movie-title { font-size: 11px; margin-top: 5px; text-align: center; color: #bbb; height: 30px; overflow: hidden; }
        .btn-group { display: flex; gap: 4px; margin-top: 5px; }
        .btn { flex: 1; padding: 6px 0; font-size: 10px; border-radius: 4px; text-align: center; text-decoration: none; font-weight: bold; color: white; }
        .watch { background: #e50914; }
        .down { background: #2a2d36; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #141414; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="top-nav"><div class="logo">H.Movies</div><input type="text" class="search-box" placeholder="Search..."></div>
    <div class="hero"><div class="hero-overlay"><h2 style="color:#e50914">TRENDING</h2></div></div>
    <div class="section-title">Top Rankings</div><div id="rankings-row" class="movie-row"></div>
    <div class="section-title">Popular Cinema</div><div id="cinema-row" class="movie-row"></div>
    <div class="bottom-nav"><div style="color:#e50914">🏠<br>Home</div><div>📚<br>Novel</div><div>⬇️<br>Down</div><div>👤<br>Me</div></div>
    <script>
        fetch('https://api.tvmaze.com/search/shows?q=movie')
        .then(res => res.json()).then(data => {
            const rRow = document.getElementById('rankings-row');
            const cRow = document.getElementById('cinema-row');
            data.forEach((item, index) => {
                const show = item.show;
                const imdbId = show.externals.imdb;
                const img = show.image ? show.image.medium : 'https://via.placeholder.com/130x190';
                const watchUrl = imdbId ? `https://vidsrc.to/embed/movie/${imdbId}` : '#';
                const downUrl = imdbId ? `https://www.2embed.cc/embed/${imdbId}` : '#';
                const html = `<div class="movie-card">${index < 5 ? `<div class="rank-num">${index+1}</div>` : ''}<img src="${img}"><div class="movie-title">${show.name}</div><div class="btn-group"><a href="${watchUrl}" target="_blank" class="btn watch">Watch</a><a href="${downUrl}" target="_blank" class="btn down">Down</a></div></div>`;
                if(index < 5) rRow.innerHTML += html; else cRow.innerHTML += html;
            });
        });
    </script>
</body>
</html>
