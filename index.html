<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.nav{padding:15px;background:#111;}
.logo{color:#2ecc71;font-size:24px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;padding:15px;}

.card{border-radius:10px;overflow:hidden;background:#111;}
.card img{width:100%;height:220px;object-fit:cover;}

.overlay{padding:10px;}
.btn{background:#2ecc71;color:#000;padding:5px;border-radius:5px;text-decoration:none;}

.admin{
position:fixed;bottom:15px;right:15px;
background:#2ecc71;color:#000;
padding:12px;border-radius:10px;
cursor:pointer;
}

.panel{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:20px;
border-radius:10px;width:90%;
z-index:9999;
}

.panel.show{display:block;}

input{
width:100%;margin:5px 0;padding:10px;
background:#222;color:#fff;border:none;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">H.MOVIES PRO</div>
</div>

<div id="grid" class="grid"></div>

<div class="admin" onclick="openPanel()">+ Add</div>

<div id="panel" class="panel">
<h3>Add Movie</h3>
<input id="title" placeholder="Title">
<input id="img" placeholder="Poster URL">
<input id="watch" placeholder="Watch Link">
<input id="download" placeholder="Download Link">
<button onclick="save()">Save</button>
<button onclick="closePanel()">Close</button>
</div>

<script>

let movies = JSON.parse(localStorage.getItem("movies")||"[]");

function openPanel(){
 document.getElementById('panel').classList.add('show');
}

function closePanel(){
 document.getElementById('panel').classList.remove('show');
}

function save(){
 const m = {
  title: title.value,
  img: img.value,
  watch: watch.value,
  download: download.value
 };

 movies.push(m);
 localStorage.setItem("movies",JSON.stringify(movies));
 location.reload();
}

function load(){
 movies.forEach(m=>{
  const card=document.createElement('div');
  card.className="card";

  card.innerHTML=`
  <img src="${m.img}">
  <div class="overlay">
    <div>${m.title}</div>
    <a href="${m.watch}" class="btn">Watch</a>
    <a href="${m.download}" class="btn">Download</a>
  </div>
  `;

  document.getElementById('grid').appendChild(card);
 });
}

load();

</script>

</body>
</html>
