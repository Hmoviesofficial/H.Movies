<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Movies Official</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#080808; color:white; }
        .nav { padding:15px; background:#141414; text-align:center; border-bottom:1px solid #333; }
        .logo { color:#e50914; font-weight:bold; font-size:26px; }
        .search { background:#2a2d36; border:none; padding:12px; border-radius:8px; color:white; width:80%; margin-top:10px; outline:none; }
        .row { display:flex; flex-wrap:wrap; padding:10px; gap:10px; justify-content:center; }
        .card { width:45%; background:#141414; border-radius:10px; margin-bottom:15px; overflow:hidden; border:1px solid #222; text-align:center; }
        .card img { width:100%; height:230px; object-fit:cover; display:block; }
        .title { font-size:12px; padding:8px 5px; height:35px; overflow:hidden; }
        .btn { display:block; padding:10px; border-radius:5px; text-decoration:none; font-weight:bold; color:white; margin:5px; font-size:11px; background:#e50914; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">H.Movies</div>
        <input type="text" id="s" class="search" placeholder="Search movie...">
    </div>
    <div id="out" class="row"></div>

    <script>
        var k = '86202476b76a0841f22e848981329124';
        
        function load(q) {
            var box = document.getElementById('out');
            box.innerHTML = 'Searching...';
            
            var url = q  ?
                  "https://api.themoviedb.org/3/search/movie?api_key=" + k + "&query=" + encodeURIComponent(q)
                  "https://api.themoviedb.org/3/discover/movie?api_key=" + k + "&sort_by=popularity.desc";
            
            fetch(url).then(function(res) { return res.json(); }).then(function(data) {
                box.innerHTML = '';
                data.results.forEach(function(m) {
                    if(m.poster_path) {
                        var img = "https://image.tmdb.org/t/p/w500" + m.poster_path;
                        var watch = "https://vidsrc.to/embed/movie/" + m.id;
                        
                        var item = document.createElement('div');
                        item.className = 'card';
                        item.innerHTML = '<img src="' + img + '"><div class="title">' + m.title + '</div><a href="' + watch + '" target="_blank" class="btn">Watch Now</a>';
                        box.appendChild(item);
                    }
                });
            }).catch(function(e) {
                box.innerHTML = 'Error! Try again.';
            });
        }

        document.getElementById('s').onkeypress = function(e) {
            if(e.key === 'Enter') load(e.target.value);
        };
        
        load(''); 
    </script>
</body>
</html>
