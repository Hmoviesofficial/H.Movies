        .row { display:flex; flex-wrap:wrap; padding:10px; gap:10px; justify-content:space-around; }

        .card img { width:100%; height:230px; object-fit:cover; display:block; background:#222; }

        .watch { background:#e50914; }
        .down { background:#333; border:1px solid #444; }
    </style>
</head>

        <div class="logo">H.Movies</div>
        <input type="text" id="s" class="search" placeholder="Search movies (e.g. Batman)...">
    </div>

                 <script>
        const k = '86202476b76a0841f22e848981329124';
        function load(path, isS = false) {
            const box = document.getElementById('out');
            box.innerHTML = '<p style="padding:20px;">Updating Movies...</p>';
            
            let url = isS 
                ? "https://api.themoviedb.org/3/search/movie?api_key=" + k + "&query=" + encodeURIComponent(path)
                : "https://api.themoviedb.org/3/discover/movie?api_key=" + k + "&sort_by=popularity.desc";

            fetch(url).then(r => r.json()).then(data => {
                box.innerHTML = '';
                if(!data.results || data.results.length === 0) {
                    box.innerHTML = '<p style="padding:20px;">No movies found. Try searching.</p>';
                    return;
                }
                data.results.forEach(m => {
                    if(m.poster_path) {
                        const img = "https://image.tmdb.org/t/p/w500" + m.poster_path;
                        const s1 = "https://vidsrc.to/embed/movie/" + m.id;
                        const d1 = "https://vidsrc.xyz/movie/" + m.id;
                        box.innerHTML += '<div class="card">' +
                                '<img src="' + img + '">' +
                                '<div class="title">' + m.title + '</div>' +
                                '<a href="' + s1 + '" target="_blank" class="btn watch">Watch Now</a>' +
                                '<a href="' + d1 + '" target="_blank" class="btn down">Download HD</a>' +
                            '</div>';
                    }
                });
            }).catch(e => { 
                box.innerHTML = '<p style="padding:20px;">Connection Error! Refresh page.</p>'; 
            });
        }
        document.getElementById('s').onkeypress = (e) => { 
            if(e.key === 'Enter') load(e.target.value.trim(), true); 
        };
        load('', false);
    </script>
</body>
</html>
